name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-and-docs:
    name: npm metadata and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          package-manager-cache: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Validate npm package identity
        run: |
          set -euo pipefail
          node <<'NODE'
          const pkg = require("./codex-cli/package.json");
          const expected = {
            name: "@lpalbou/codex-unleashed",
            version: "0.1.0",
            bin: "codex-unleashed",
            repository: "git+https://github.com/lpalbou/codex-unleashed.git",
          };
          if (pkg.name !== expected.name) {
            throw new Error(`unexpected package name: ${pkg.name}`);
          }
          if (pkg.version !== expected.version) {
            throw new Error(`unexpected package version: ${pkg.version}`);
          }
          if (!pkg.bin || pkg.bin[expected.bin] !== "bin/codex.js") {
            throw new Error("codex-unleashed bin entry is missing");
          }
          if (!pkg.publishConfig || pkg.publishConfig.access !== "public") {
            throw new Error("publishConfig.access must be public");
          }
          if (!pkg.repository || pkg.repository.url !== expected.repository) {
            throw new Error(`repository.url must be ${expected.repository}`);
          }
          NODE

      - name: Validate npm launcher syntax
        run: node --check codex-cli/bin/codex.js

      - name: Stage meta npm package
        run: |
          set -euo pipefail
          version="$(node -p "require('./codex-cli/package.json').version")"
          tmpdir="$(mktemp -d)"
          python3 ./codex-cli/scripts/build_npm_package.py \
            --package codex \
            --version "${version}" \
            --staging-dir "${tmpdir}/stage" \
            --pack-output "${tmpdir}/codex-unleashed.tgz"
          package_json="$(tar -xOf "${tmpdir}/codex-unleashed.tgz" package/package.json)"
          PACKAGE_JSON="${package_json}" node <<'NODE'
          const pkg = JSON.parse(process.env.PACKAGE_JSON);
          if (pkg.name !== "@lpalbou/codex-unleashed") {
            throw new Error(`unexpected packed name: ${pkg.name}`);
          }
          if (!pkg.optionalDependencies) {
            throw new Error("packed meta package must declare platform optionalDependencies");
          }
          for (const name of Object.keys(pkg.optionalDependencies)) {
            if (!name.startsWith("@lpalbou/codex-unleashed-")) {
              throw new Error(`unexpected optional dependency alias: ${name}`);
            }
          }
          NODE

      - name: Validate Python release scripts
        run: |
          python3 -m py_compile \
            codex-cli/scripts/build_npm_package.py \
            codex-cli/scripts/install_native_deps.py \
            scripts/stage_npm_packages.py

      - name: Build documentation
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install mkdocs
          mkdocs build --strict

  rust-smoke:
    name: rust cli smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
      - name: Install native Linux dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libcap-dev pkg-config
      - name: Cargo check codex-unleashed
        working-directory: codex-rs
        run: cargo check -p codex-cli --bin codex-unleashed
