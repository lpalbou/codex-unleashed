name: npm-publish-codex-unleashed

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to stage or publish. Must match codex-cli/package.json."
        required: true
        type: string
      native_artifacts_workflow_url:
        description: "Successful lpalbou/codex-unleashed native-artifacts workflow URL."
        required: true
        type: string
      publish:
        description: "Publish to npm. Leave false to only stage and validate tarballs."
        required: true
        default: false
        type: boolean
      publish_confirmation:
        description: "Required when publish=true: publish-lpalbou-codex-unleashed-<version>"
        required: false
        type: string

concurrency:
  group: npm-publish-codex-unleashed-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stage:
    name: stage npm tarballs
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      should_publish: ${{ steps.publish_mode.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: Validate main branch and package identity
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error title=Wrong branch::Run this workflow from main only."
            exit 1
          fi
          node <<'NODE'
          const pkg = require("./codex-cli/package.json");
          if (pkg.name !== "@lpalbou/codex-unleashed") {
            throw new Error(`unexpected package name: ${pkg.name}`);
          }
          if (!pkg.repository || pkg.repository.url !== "git+https://github.com/lpalbou/codex-unleashed.git") {
            throw new Error("package repository.url must match lpalbou/codex-unleashed");
          }
          if (!pkg.publishConfig || pkg.publishConfig.access !== "public") {
            throw new Error("publishConfig.access must be public");
          }
          NODE

      - name: Validate version
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./codex-cli/package.json').version")"
          if [[ "${VERSION}" != "${package_version}" ]]; then
            echo "::error title=Version mismatch::Input ${VERSION} must match codex-cli/package.json ${package_version}."
            exit 1
          fi
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]]; then
            echo "::error title=Invalid version::Use x.y.z, x.y.z-alpha.N, or x.y.z-beta.N."
            exit 1
          fi
          npm_tag=""
          if [[ "${VERSION}" =~ -alpha(\.|$) ]]; then
            npm_tag="alpha"
          elif [[ "${VERSION}" =~ -beta(\.|$) ]]; then
            npm_tag="beta"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${npm_tag}" >> "$GITHUB_OUTPUT"

      - name: Validate publish mode
        id: publish_mode
        env:
          PUBLISH: ${{ inputs.publish }}
          CONFIRMATION: ${{ inputs.publish_confirmation }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "${PUBLISH}" == "true" ]]; then
            expected="publish-lpalbou-codex-unleashed-${VERSION}"
            if [[ "${CONFIRMATION}" != "${expected}" ]]; then
              echo "::error title=Missing confirmation::Set publish_confirmation to ${expected}."
              exit 1
            fi
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate native artifact workflow
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_URL: ${{ inputs.native_artifacts_workflow_url }}
        run: |
          set -euo pipefail
          if [[ ! "${WORKFLOW_URL}" =~ ^https://github\.com/lpalbou/codex-unleashed/actions/runs/[0-9]+/?$ ]]; then
            echo "::error title=Invalid workflow URL::Use a lpalbou/codex-unleashed Actions run URL."
            exit 1
          fi
          run_id="${WORKFLOW_URL%/}"
          run_id="${run_id##*/}"
          run_name="$(gh run view "${run_id}" --repo lpalbou/codex-unleashed --json name --jq .name)"
          run_conclusion="$(gh run view "${run_id}" --repo lpalbou/codex-unleashed --json conclusion --jq .conclusion)"
          run_head_sha="$(gh run view "${run_id}" --repo lpalbou/codex-unleashed --json headSha --jq .headSha)"
          if [[ "${run_name}" != "native-artifacts" ]]; then
            echo "::error title=Unexpected workflow::Expected native-artifacts, got ${run_name}."
            exit 1
          fi
          if [[ "${run_conclusion}" != "success" ]]; then
            echo "::warning title=Workflow not fully successful::Run ${run_id} concluded with ${run_conclusion}; staging will still require every supported platform artifact."
          fi
          if ! git merge-base --is-ancestor "${run_head_sha}" "${GITHUB_SHA}"; then
            echo "::error title=Artifact commit mismatch::Native artifacts were built from ${run_head_sha}, which is not an ancestor of ${GITHUB_SHA}."
            exit 1
          fi

      - name: Stage npm tarballs
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          WORKFLOW_URL: ${{ inputs.native_artifacts_workflow_url }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm
          python3 ./scripts/stage_npm_packages.py \
            --release-version "${VERSION}" \
            --package codex \
            --workflow-url "${WORKFLOW_URL}" \
            --output-dir dist/npm

      - name: Validate staged tarballs
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/npm/*.tgz)
          if [[ ${#tarballs[@]} -ne 6 ]]; then
            echo "::error title=Unexpected tarball count::Expected 6 Codex Unleashed tarballs, found ${#tarballs[@]}."
            printf '%s\n' "${tarballs[@]}"
            exit 1
          fi
          for tarball in "${tarballs[@]}"; do
            package_json="$(tar -xOf "${tarball}" package/package.json)"
            package_name="$(node -e 'const fs = require("node:fs"); console.log(JSON.parse(fs.readFileSync(0, "utf8")).name);' <<< "${package_json}")"
            package_version="$(node -e 'const fs = require("node:fs"); console.log(JSON.parse(fs.readFileSync(0, "utf8")).version);' <<< "${package_json}")"
            if [[ "${package_name}" != "@lpalbou/codex-unleashed" ]]; then
              echo "::error title=Unexpected tarball package::${tarball} contains ${package_name}."
              exit 1
            fi
            case "${package_version}" in
              "${VERSION}"|"${VERSION}"-linux-*|"${VERSION}"-darwin-*|"${VERSION}"-win32-*) ;;
              *)
                echo "::error title=Unexpected tarball version::${tarball} contains ${package_version}."
                exit 1
                ;;
            esac
            npm publish --dry-run "${tarball}" --access public --tag dry-run
          done

      - uses: actions/upload-artifact@v4
        with:
          name: codex-unleashed-npm-${{ steps.version.outputs.version }}
          path: dist/npm/*.tgz
          if-no-files-found: error

  publish:
    name: publish npm tarballs
    needs: stage
    if: ${{ needs.stage.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@lpalbou/codex-unleashed
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v4
        with:
          name: codex-unleashed-npm-${{ needs.stage.outputs.version }}
          path: dist/npm

      - name: Publish to npm
        env:
          NPM_TAG: ${{ needs.stage.outputs.npm_tag }}
          VERSION: ${{ needs.stage.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          platform_tarballs=(
            dist/npm/codex-npm-linux-*-"${VERSION}".tgz
            dist/npm/codex-npm-darwin-*-"${VERSION}".tgz
            dist/npm/codex-npm-win32-*-"${VERSION}".tgz
          )
          meta_tarball="dist/npm/codex-npm-${VERSION}.tgz"
          if [[ ${#platform_tarballs[@]} -ne 5 ]]; then
            echo "::error title=Unexpected platform tarball count::Expected 5, found ${#platform_tarballs[@]}."
            printf '%s\n' "${platform_tarballs[@]}"
            exit 1
          fi
          if [[ ! -f "${meta_tarball}" ]]; then
            echo "::error title=Missing meta package::Expected ${meta_tarball}."
            exit 1
          fi
          tarballs=("${platform_tarballs[@]}" "${meta_tarball}")
          for tarball in "${tarballs[@]}"; do
            filename="$(basename "${tarball}")"
            tag=""
            case "${filename}" in
              codex-npm-linux-*-"${VERSION}".tgz|codex-npm-darwin-*-"${VERSION}".tgz|codex-npm-win32-*-"${VERSION}".tgz)
                platform="${filename#codex-npm-}"
                platform="${platform%-${VERSION}.tgz}"
                tag="${platform}"
                if [[ -n "${NPM_TAG}" ]]; then
                  tag="${NPM_TAG}-${platform}"
                fi
                ;;
              codex-npm-"${VERSION}".tgz)
                tag="${NPM_TAG}"
                ;;
              *)
                echo "::error title=Unexpected tarball::${filename}"
                exit 1
                ;;
            esac
            publish_cmd=(npm publish "${GITHUB_WORKSPACE}/${tarball}" --access public)
            if [[ -n "${tag}" ]]; then
              publish_cmd+=(--tag "${tag}")
            fi
            echo "+ ${publish_cmd[*]}"
            "${publish_cmd[@]}"
          done
